services:
  app:
    build: .
    container_name: tryggarum
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_proxy"
      - "traefik.http.routers.tryggarum.rule=Host(`tryggarum.nu`) || Host(`www.tryggarum.nu`)"
      - "traefik.http.routers.tryggarum.entrypoints=websecure"
      - "traefik.http.routers.tryggarum.tls=true"
      - "traefik.http.routers.tryggarum.tls.certresolver=letsencrypt"
      - "traefik.http.services.tryggarum.loadbalancer.server.port=80"
    networks:
      - traefik_proxy

  kontakt-api:
    build: ./api
    container_name: kontakt-api
    restart: unless-stopped
    environment:
      - RESEND_API_KEY=${RESEND_API_KEY}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_proxy"
      - "traefik.http.routers.kontakt.rule=(Host(`tryggarum.nu`) || Host(`www.tryggarum.nu`)) && PathPrefix(`/api`)"
      - "traefik.http.routers.kontakt.entrypoints=websecure"
      - "traefik.http.routers.kontakt.tls=true"
      - "traefik.http.routers.kontakt.tls.certresolver=letsencrypt"
      - "traefik.http.services.kontakt.loadbalancer.server.port=4000"
      - "traefik.http.routers.kontakt.priority=100"
    networks:
      - traefik_proxy

networks:
  traefik_proxy:
    external: true
